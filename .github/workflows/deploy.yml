name: Deploy To VPS

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: production
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy on production push
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'production' }}
      APP_DIR: ${{ secrets.APP_DIR }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
      APP_PORT: ${{ secrets.APP_PORT }}

    steps:
      - name: SSH into VPS and run deploy script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.SSH_USERNAME || secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD || secrets.VPS_PASSWORD }}
          port: ${{ secrets.SSH_PORT || secrets.VPS_PORT || '22' }}
          envs: DEPLOY_BRANCH,APP_DIR,PM2_APP_NAME,APP_PORT
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/home/ubuntu/rumi77-ai_skin_care-jvai}"
            DEPLOY_BRANCH="${DEPLOY_BRANCH:-production}"
            PM2_APP_NAME="${PM2_APP_NAME:-rumi77-ai-skin-care}"
            APP_PORT="${APP_PORT:-3000}"

            if [ ! -d "$APP_DIR" ]; then
              echo "App directory not found: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            chmod +x ./deploy.sh
            ./deploy.sh "$DEPLOY_BRANCH" "$PM2_APP_NAME" "$APP_PORT"
